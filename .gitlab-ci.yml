test cypress image:
  stage: Test
  needs:
    - build cypress 18
  image: $CYPRESS:18-latest
  only:
    - main
  services:
    - docker:27-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  script:
    - node -v
    - cypress -v
    - docker info
    - docker compose --help
