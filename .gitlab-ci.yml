variables:
  BASE: cokoapps/base
  DEV: cokoapps/base-dev
  DOCKER: cokoapps/base-docker
  CYPRESS: cokoapps/cypress
  RELEASE: cokoapps/release
  RELEASE_DOCKER: cokoapps/release-docker
  FLY: cokoapps/fly

stages:
  - Build
  - Test

build base 18:
  stage: Build
  image: ${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX}/docker:27-dind
  services:
    - docker:27-dind
  only:
    - main
  before_script:
    - docker login -u $DOCKERHUB_USERNAME -p $DOCKERHUB_PASSWORD
  script:
    - docker build
      --tag $BASE:18
      --tag $BASE:18-latest
      --tag $BASE:18-$(date +'%Y-%m-%d')
      -f Dockerfile-base-18 .
    - docker push $BASE:18
    - docker push $BASE:18-latest
    - docker push $BASE:18-$(date +'%Y-%m-%d')

